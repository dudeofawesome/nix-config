name: Update custom packages

on:
  schedule:
    - cron: "17 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-custom-packages
  cancel-in-progress: false

jobs:
  update:
    name: Run package updaters
    runs-on: macos-latest
    env:
      CACHIX_CACHE_NAME: dudeofawesome

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Enable custom Cachix cache
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run updaters
        shell: bash
        run: |
          set -euo pipefail

          nix shell nixpkgs#jq nixpkgs#nix-update -c bash <<'EOF'
          set -euo pipefail

          packages="$(
            nix eval --impure --json --expr '
              let
                flake = builtins.getFlake (toString ./.);
                packages = flake.packages.${builtins.currentSystem};
                hasUpdater = name:
                  let
                    package = packages.${name};
                  in
                    package ? passthru && package.passthru ? updateScript;
              in
                builtins.filter hasUpdater (builtins.attrNames packages)
            '
          )"

          jq -r '.[]' <<< "$packages" | while read -r package; do
            echo "::group::Updating $package"

            update_script="$(
              nix eval --impure --json --expr "
                let
                  flake = builtins.getFlake (toString ./.);
                  packages = flake.packages.\${builtins.currentSystem};
                in
                  (builtins.getAttr "${package}" packages).passthru.updateScript
              "
            )"

            if jq -e 'type == "array"' <<< "$update_script" >/dev/null; then
              nix-update --flake --use-update-script "$package"
            else
              script="$(
                jq --raw-output '.' <<< "$update_script"
              )"
              context="$(
                nix eval --impure --json --expr "
                  let
                  flake = builtins.getFlake (toString ./.);
                  packages = flake.packages.\${builtins.currentSystem};
                in
                    builtins.getContext (
                      builtins.getAttr "${package}" packages
                    ).passthru.updateScript
                "
              )"

              jq -r 'keys[]' <<< "$context" | while read -r drv; do
                nix-store --realise "$drv"
              done

              "$script"
            fi

            echo "::endgroup::"
          done
          EOF

      - name: Format Nix files
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t nix_files < <(
            git ls-files --modified --others --exclude-standard -- '*.nix'
          )

          if ((${#nix_files[@]})); then
            nix fmt "${nix_files[@]}"
          fi

      - name: Build custom packages
        shell: bash
        run: |
          set -euo pipefail

          # shellcheck disable=SC2016
          mapfile -t package_attrs < <(
            nix eval --impure --raw --expr '
              let
                flake = builtins.getFlake (toString ./.);
                packages = flake.packages.${builtins.currentSystem};
              in
                builtins.concatStringsSep "\n" (
                  map (name: ".#" + name) (builtins.attrNames packages)
                )
            '
          )

          nix build --keep-going --no-link "${package_attrs[@]}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-custom-packages
          commit-message: "chore: update custom packages"
          title: "chore: update custom packages"
          body: |
            Automated custom package update.

            This runs every Monday at 12:17 UTC and can also be triggered manually.
          labels: dependencies
