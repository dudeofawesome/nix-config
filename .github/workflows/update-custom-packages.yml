name: Update custom packages

on:
  schedule:
    - cron: "17 12 * * 1"
  push:
    paths:
      - ".github/workflows/update-custom-packages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-custom-packages
  cancel-in-progress: false

jobs:
  update:
    name: Run package updaters
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main

      - name: Run updaters
        shell: bash
        run: |
          set -euo pipefail

          nix shell nixpkgs#jq nixpkgs#nix-update -c bash <<'EOF'
          set -euo pipefail

          packages="$(
            nix eval --impure --json --expr '
              let
                flake = builtins.getFlake (toString ./.);
                packages = flake.packages.${builtins.currentSystem};
                hasUpdater = name:
                  let
                    package = packages.${name};
                  in
                    package ? passthru && package.passthru ? updateScript;
              in
                builtins.filter hasUpdater (builtins.attrNames packages)
            '
          )"

          jq -r '.[]' <<< "$packages" | while read -r package; do
            echo "::group::Updating $package"

            update_script="$(
              PACKAGE="$package" nix eval \
                --impure \
                --json \
                --expr '
                  let
                    package = builtins.getEnv "PACKAGE";
                    flake = builtins.getFlake (toString ./.);
                    packages = flake.packages.${builtins.currentSystem};
                  in
                    (builtins.getAttr package packages).passthru.updateScript
                '
            )"

            if jq -e 'type == "array"' <<< "$update_script" >/dev/null; then
              update_command=()
              while IFS= read -r argument; do
                update_command+=("$argument")
              done < <(
                jq --raw-output '.[]' <<< "$update_script"
              )

              if [[ "$(basename "${update_command[0]}")" == "nix-update" ]]; then
                update_command[0]="nix-update"
              fi

              "${update_command[@]}" --flake "$package"
            else
              script="$(
                jq --raw-output '.' <<< "$update_script"
              )"
              context="$(
                PACKAGE="$package" nix eval \
                  --impure \
                  --json \
                  --expr '
                    let
                      package = builtins.getEnv "PACKAGE";
                      flake = builtins.getFlake (toString ./.);
                      packages = flake.packages.${builtins.currentSystem};
                    in
                      builtins.getContext (
                        builtins.getAttr package packages
                      ).passthru.updateScript
                  '
              )"

              jq -r 'keys[]' <<< "$context" | while read -r drv; do
                nix-store --realise "$drv"
              done

              "$script"
            fi

            echo "::endgroup::"
          done
          EOF

      - name: Format Nix files
        shell: bash
        run: |
          set -euo pipefail

          nix_files=()
          while IFS= read -r nix_file; do
            nix_files+=("$nix_file")
          done < <(
            git ls-files --modified --others --exclude-standard -- '*.nix'
          )

          if ((${#nix_files[@]})); then
            nix fmt "${nix_files[@]}"
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: automation/update-custom-packages
          commit-message: "chore: update custom packages"
          title: "chore: update custom packages"
          body: |
            Automated custom package update.

            This runs every Monday at 12:17 UTC and can also be triggered manually.
          labels: dependencies
