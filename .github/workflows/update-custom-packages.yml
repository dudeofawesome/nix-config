name: Update custom packages

on:
  schedule:
    - cron: "17 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-custom-packages
  cancel-in-progress: false

jobs:
  discover:
    name: Discover package updaters
    runs-on: macos-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main

      - name: Find packages with update scripts
        id: packages
        shell: bash
        run: |
          set -euo pipefail

          # shellcheck disable=SC2016
          packages="$(
            nix eval --impure --json --expr '
              let
                flake = builtins.getFlake (toString ./.);
                packages = flake.packages.${builtins.currentSystem};
              in
              builtins.filter (
                name: packages.${name} ? updateScript
              ) (builtins.attrNames packages)
            '
          )"

          echo "packages=$(jq --compact-output . <<< "$packages")" \
            >> "$GITHUB_OUTPUT"

  update:
    name: Update ${{ matrix.package }}
    needs: discover
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@33c9ab3ef95cd57c164d9d6eb1f9a46338538d41 # main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@55718cd9ebf1737a061487d5ada21abf31e99a98 # main

      - name: Update package
        id: update
        continue-on-error: true
        shell: bash
        run: ./scripts/update-package.sh "${{ matrix.package }}"

      - name: Report failed update
        if: steps.update.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning title=Package update failed::${{ matrix.package }} failed; continuing with other packages"

      - name: Format changed Nix files
        if: steps.update.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail

          nix_files=()
          while IFS= read -r nix_file; do
            nix_files+=("$nix_file")
          done < <(
            git ls-files --modified --others --exclude-standard -- '*.nix'
          )

          if ((${#nix_files[@]})); then
            nix fmt "${nix_files[@]}"
          fi

      - name: Create pull request
        if: steps.update.outcome == 'success'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: automation/update-${{ matrix.package }}
          delete-branch: true
          commit-message: "chore(${{ matrix.package }}): update package"
          title: "chore(${{ matrix.package }}): update package"
          body: |
            Automated update for `${{ matrix.package }}`.

            This workflow runs every Monday at 12:17 UTC and can also be triggered manually.
          labels: dependencies
